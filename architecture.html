<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mnemosylva — Architecture</title>
  <style>
    body {
      margin: 0; padding: 30px;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }
    h2 {
      text-align: center; color: #1a1f36;
      margin-bottom: 6px; font-size: 22px;
    }
    p.subtitle {
      text-align: center; color: #888;
      margin: 0 0 28px; font-size: 13px;
    }
    svg { display: block; margin: 0 auto; }
  </style>
</head>
<body>
<h2>Mnemosylva — Application Architecture</h2>
<p class="subtitle">Single-file Python/Flask file indexer</p>

<svg width="900" height="720" viewBox="0 0 900 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
    <!-- Drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- ── BROWSER LAYER ─────────────────────────────── -->
  <rect x="30" y="20" width="840" height="140" rx="10"
        fill="#eef3fb" stroke="#4a90d9" stroke-width="2" filter="url(#shadow)"/>
  <text x="50" y="44" font-size="13" font-weight="bold" fill="#4a90d9">BROWSER (Client)</text>

  <!-- Sub-boxes -->
  <rect x="55"  y="54" width="190" height="88" rx="6" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="150" y="73"  font-size="12" font-weight="bold" fill="#1a1f36" text-anchor="middle">HTML / CSS UI</text>
  <text x="150" y="91"  font-size="11" fill="#555" text-anchor="middle">Table, pagination,</text>
  <text x="150" y="106" font-size="11" fill="#555" text-anchor="middle">metadata bar,</text>
  <text x="150" y="121" font-size="11" fill="#555" text-anchor="middle">search + filter toolbar</text>

  <rect x="270" y="54" width="190" height="88" rx="6" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="365" y="73"  font-size="12" font-weight="bold" fill="#1a1f36" text-anchor="middle">Client-side JS</text>
  <text x="365" y="91"  font-size="11" fill="#555" text-anchor="middle">Instant filename search,</text>
  <text x="365" y="106" font-size="11" fill="#555" text-anchor="middle">extension filter,</text>
  <text x="365" y="121" font-size="11" fill="#555" text-anchor="middle">scan progress polling</text>

  <rect x="485" y="54" width="190" height="88" rx="6" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="580" y="73"  font-size="12" font-weight="bold" fill="#1a1f36" text-anchor="middle">HTTP Requests</text>
  <text x="580" y="91"  font-size="11" fill="#555" text-anchor="middle">GET /  (browse, search, sort)</text>
  <text x="580" y="106" font-size="11" fill="#555" text-anchor="middle">POST /action  (scan/stop/init)</text>
  <text x="580" y="121" font-size="11" fill="#555" text-anchor="middle">GET /status  (poll JSON)</text>

  <rect x="700" y="54" width="148" height="88" rx="6" fill="white" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="774" y="73"  font-size="12" font-weight="bold" fill="#1a1f36" text-anchor="middle">file:// links</text>
  <text x="774" y="91"  font-size="11" fill="#555" text-anchor="middle">Open file directly</text>
  <text x="774" y="106" font-size="11" fill="#555" text-anchor="middle">Open containing</text>
  <text x="774" y="121" font-size="11" fill="#555" text-anchor="middle">folder in Finder</text>

  <!-- Arrow: Browser → Flask -->
  <line x1="450" y1="160" x2="450" y2="198"
        stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="340" y="166" width="220" height="18" rx="4" fill="#eef3fb"/>
  <text x="450" y="179" font-size="11" fill="#4a90d9" text-anchor="middle">HTTP  ·  127.0.0.1:5000</text>

  <!-- ── FLASK LAYER ─────────────────────────────────── -->
  <rect x="30" y="200" width="840" height="190" rx="10"
        fill="#edfaf1" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="50" y="224" font-size="13" font-weight="bold" fill="#27ae60">FLASK WEB SERVER  (mnemosylva.py · Python 3)</text>

  <!-- Route boxes -->
  <rect x="55"  y="234" width="195" height="136" rx="6" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="152" y="253" font-size="12" font-weight="bold" fill="#1a1f36" text-anchor="middle">GET /  →  index()</text>
  <text x="152" y="270" font-size="11" fill="#555" text-anchor="middle">build_where_clause()</text>
  <text x="152" y="285" font-size="11" fill="#555" text-anchor="middle">SQL SELECT + paginate</text>
  <text x="152" y="300" font-size="11" fill="#555" text-anchor="middle">format_size() per row</text>
  <text x="152" y="315" font-size="11" fill="#555" text-anchor="middle">os.path.splitext() → ext</text>
  <text x="152" y="330" font-size="11" fill="#555" text-anchor="middle">os.path.dirname() → folder</text>
  <text x="152" y="345" font-size="11" fill="#555" text-anchor="middle">render_template_string()</text>
  <text x="152" y="360" font-size="11" fill="#555" text-anchor="middle">→ full HTML response</text>

  <rect x="275" y="234" width="195" height="136" rx="6" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="372" y="253" font-size="12" font-weight="bold" fill="#1a1f36" text-anchor="middle">POST /action  →  action()</text>
  <text x="372" y="270" font-size="11" fill="#555" text-anchor="middle">initialize → create_db()</text>
  <text x="372" y="285" font-size="11" fill="#555" text-anchor="middle">clear → clear_index()</text>
  <text x="372" y="300" font-size="11" fill="#555" text-anchor="middle">scan → spawn thread</text>
  <text x="372" y="315" font-size="11" fill="#555" text-anchor="middle">stop → SCANNING=False</text>
  <text x="372" y="330" font-size="11" fill="#555" text-anchor="middle">→ redirect to /</text>

  <rect x="495" y="234" width="180" height="136" rx="6" fill="white" stroke="#27ae60" stroke-width="1.5"/>
  <text x="585" y="253" font-size="12" font-weight="bold" fill="#1a1f36" text-anchor="middle">GET /status  →  status()</text>
  <text x="585" y="270" font-size="11" fill="#555" text-anchor="middle">reads SCAN_PROGRESS</text>
  <text x="585" y="285" font-size="11" fill="#555" text-anchor="middle">returns JSON:</text>
  <text x="585" y="300" font-size="11" fill="#888" text-anchor="middle">{ scanning: bool,</text>
  <text x="585" y="315" font-size="11" fill="#888" text-anchor="middle">  file_count: int,</text>
  <text x="585" y="330" font-size="11" fill="#888" text-anchor="middle">  current_dir: str }</text>

  <!-- Global state box -->
  <rect x="700" y="234" width="148" height="136" rx="6" fill="#fffde7" stroke="#f9a825" stroke-width="1.5"/>
  <text x="774" y="253" font-size="12" font-weight="bold" fill="#1a1f36" text-anchor="middle">Global State</text>
  <text x="774" y="270" font-size="11" fill="#888" text-anchor="middle">(in-process)</text>
  <text x="774" y="290" font-size="11" fill="#555" text-anchor="middle">SCANNING (bool)</text>
  <text x="774" y="307" font-size="11" fill="#555" text-anchor="middle">SCAN_PROGRESS</text>
  <text x="774" y="322" font-size="11" fill="#555" text-anchor="middle">SCAN_METADATA</text>
  <text x="774" y="337" font-size="11" fill="#555" text-anchor="middle">DEMO_MODE</text>
  <text x="774" y="354" font-size="11" fill="#555" text-anchor="middle">JUNK_NAMES/EXTS</text>

  <!-- Arrows Flask → SQLite and Flask → Thread -->
  <!-- Flask index → SQLite -->
  <line x1="220" y1="392" x2="220" y2="448"
        stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="232" y="426" font-size="10" fill="#555">SQL SELECT</text>

  <!-- Flask action → Scanner thread -->
  <line x1="530" y1="392" x2="580" y2="448"
        stroke="#e67e22" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="508" y="432" font-size="10" fill="#e67e22">spawns thread</text>

  <!-- ── SQLITE LAYER ───────────────────────────────── -->
  <rect x="30" y="450" width="380" height="150" rx="10"
        fill="#fdf6ec" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
  <text x="50" y="474" font-size="13" font-weight="bold" fill="#e67e22">SQLITE DATABASE  (file_index.db)</text>

  <rect x="55" y="484" width="330" height="96" rx="6" fill="white" stroke="#e67e22" stroke-width="1.5"/>
  <text x="220" y="503" font-size="12" font-weight="bold" fill="#1a1f36" text-anchor="middle">files  table</text>
  <!-- Two columns of schema -->
  <text x="100" y="521" font-size="11" fill="#555">id  INTEGER PK</text>
  <text x="100" y="537" font-size="11" fill="#555">path  TEXT UNIQUE</text>
  <text x="100" y="553" font-size="11" fill="#555">name  TEXT</text>
  <text x="100" y="569" font-size="11" fill="#555">size  INTEGER</text>
  <text x="260" y="521" font-size="11" fill="#555">created  TEXT</text>
  <text x="260" y="537" font-size="11" fill="#555">modified  TEXT</text>
  <text x="260" y="553" font-size="11" fill="#555">hash  TEXT (SHA-256)</text>

  <!-- ── SCANNER THREAD ─────────────────────────────── -->
  <rect x="460" y="450" width="260" height="150" rx="10"
        fill="#fef9f0" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="474" font-size="13" font-weight="bold" fill="#e67e22">SCANNER THREAD</text>
  <text x="480" y="492" font-size="11" fill="#555">scan_directory() runs in background</text>
  <text x="480" y="510" font-size="11" fill="#555">os.walk(base_path)</text>
  <text x="480" y="526" font-size="11" fill="#555">os.stat() → timestamps + size</text>
  <text x="480" y="542" font-size="11" fill="#555">hashlib.sha256() → file hash</text>
  <text x="480" y="558" font-size="11" fill="#555">INSERT OR REPLACE → SQLite</text>
  <text x="480" y="574" font-size="11" fill="#555">updates SCAN_PROGRESS live</text>
  <text x="480" y="590" font-size="11" fill="#555">sets SCAN_METADATA on finish</text>

  <!-- Scanner → SQLite -->
  <line x1="460" y1="525" x2="412" y2="525"
        stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="518" font-size="10" fill="#555">INSERT</text>

  <!-- Scanner → Filesystem -->
  <line x1="590" y1="600" x2="590" y2="646"
        stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="630" font-size="10" fill="#555">reads</text>

  <!-- ── FILESYSTEM ──────────────────────────────────── -->
  <rect x="460" y="648" width="260" height="56" rx="10"
        fill="#f5f5f5" stroke="#999" stroke-width="2" filter="url(#shadow)"/>
  <text x="590" y="672" font-size="13" font-weight="bold" fill="#555" text-anchor="middle">FILESYSTEM</text>
  <text x="590" y="691" font-size="11" fill="#888" text-anchor="middle">Target directory  (default: ~)</text>

  <!-- Legend -->
  <rect x="30" y="648" width="380" height="56" rx="6" fill="white" stroke="#dde1e7" stroke-width="1.5"/>
  <text x="50" y="668" font-size="12" font-weight="bold" fill="#333">Legend</text>
  <line x1="50"  y1="682" x2="90"  y2="682" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="96"  y="686" font-size="11" fill="#555">HTTP request / response</text>
  <line x1="220" y1="682" x2="260" y2="682" stroke="#e67e22" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="266" y="686" font-size="11" fill="#555">Thread spawn / DB write</text>
  <line x1="50"  y1="698" x2="90"  y2="698" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="96"  y="702" font-size="11" fill="#555">Internal call / SQL query</text>
</svg>
</body>
</html>
